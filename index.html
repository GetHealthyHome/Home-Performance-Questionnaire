<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Performance Questionnaire</title>
  <style>
input, select, textarea {
  margin-bottom: 15px;
} 
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f8fdf8;
  }
  h1 {
    text-align: center;
    margin-bottom: 22px;
  }
form {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 20px; /* was 25px — slightly tighter form body */
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px; /* was 20px */
  margin-bottom: 3px; /* was 5px */
}

input, select, textarea {
  width: 100%;
  padding: 8px 10px;
  margin-top: 2px;
  margin-bottom: 8px; /* was 10-15px — now tighter */
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  resize: vertical;
  min-height: 80px;
}

.checkbox-group {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-left: 0;
  margin-left: 0;
  gap: 4px; /* was 6px — even tighter */
}

.checkbox-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 2px 0; /* was 4px — less vertical space */
  font-weight: normal;
  font-size: 15px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.checkbox-group input[type="checkbox"] {
  width: 18px;
  height: 18px;
  transform: translateY(2px);
}

.submit-button {
  margin-top: 20px; /* slightly tighter between last field and submit */
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  background-color: white;
  color: #54b948;
  border: 2px solid #54b948;
  border-radius: 8px;
  transition: 0.3s ease;
}

button:hover {
  background-color: #c9f3c2;
  color: black;
}

.powered-by {
  text-align: center;
  margin-top: 30px;
  font-size: 0.9em;
  color: #54b948;
}

  @media (max-width: 600px) {
    form {
      padding: 15px;
    }
    .checkbox-group label {
      width: 100%;
    }
  }
</style>

</head>
<body>

<h1>Home Performance Questionnaire</h1>

<form id="homePerformanceForm">

  <!-- Contact Information -->
  <label>Name:</label>
  <input type="text" name="Name" required>

  <label>Address:</label>
  <input type="text" name="Address" required>

  <label>Email:</label>
  <input type="email" name="Email" required>

  <label>Primary Phone:</label>
  <input type="tel" name="PrimaryPhone">

  <label>Secondary Phone:</label>
  <input type="tel" name="SecondaryPhone">

  <!-- How They Heard About You -->
  <label>How did you hear about Healthy Home Energy & Consulting?</label>
  <input type="text" name="HeardAbout">

  <label>What motivated you to get a Healthy Home Evaluation?</label>
  <input type="text" name="PrimaryMotivation">

  <!-- Improvement Benefits -->
  <label>Top 3 Potential Improvement Benefits:</label>
  <div class="checkbox-group">
    <label><input type="checkbox" name="ImprovementBenefits" value="Improved Indoor Air Quality"> Improved Indoor Air Quality</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Occupant Comfort"> Occupant Comfort</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Occupant Health and Safety"> Occupant Health and Safety</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Reduced Carbon Footprint"> Reduced Carbon Footprint</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Energy Savings"> Energy Savings</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Increased Home Value"> Increased Home Value</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Durability of Improvements"> Durability of Improvements</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Sound Attenuation"> Sound Attenuation</label>
  </div>
<h2>Home Comfort & Household Information</h2>

<label>Have you taken any steps to improve your home’s indoor air quality, comfort, or efficiency?</label>
<select name="StepsToImprove">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>If so, what have you done?</label>
<textarea name="PastSteps"></textarea>

<label>What improvements would you like to make to your home?</label>
<textarea name="TodoImprovements"></textarea>

<label>How long have you lived here?</label>
<input type="text" name="YearsLived">

<label>How many people live in your home?</label>
<input type="number" name="PeopleCount">

<label>How many and what kind of pets live here?</label>
<input type="text" name="Pets">

<label>How long do you plan on living in this home?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="StayDuration" value="Less than 5 years"> Less than 5 years</label>
  <label><input type="checkbox" name="StayDuration" value="5 to 10 years"> 5 to 10 years</label>
  <label><input type="checkbox" name="StayDuration" value="More than 10 years"> More than 10 years</label>
</div>

  
  <label>Does your home feel stuffy?</label>
<select name="StuffyAir">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>
<label>If so, where and when?</label>
<textarea name="StuffyLocations"></textarea>

  <label>Are there drafty areas?</label>
<select name="DraftyAreas">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>
  <label>If so, where and when?</label>
<textarea name="DraftLocations"></textarea>
  
<label>Is there a moisture or condensation problem in the home?</label>
<select name="MoistureProblem">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>If so, in what areas of the home?</label>
<textarea name="MoistureLocations"></textarea>

<label>Have you noticed any mold or musty smells?</label>
<select name="MoldProblem">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>If so, when and where?</label>
<textarea name="MoldLocations"></textarea>

<label>Are any rooms too hot or too cold?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="RoomTemps" value="Too Cold"> Too Cold</label>
  <label><input type="checkbox" name="RoomTemps" value="Too Warm"> Too Warm</label>
</div>

<label>If so, where and when?</label>
<textarea name="RoomTempLocations"></textarea>

  <label>Do you find your home:</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="SeasonalHumidity" value="Humid in the summer"> Humid in the summer</label>
  <label><input type="checkbox" name="SeasonalHumidity" value="Dry in the winter"> Dry in the winter</label>
</div>

<label>Does anyone in your home suffer from:</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="HealthIssues" value="Allergies"> Allergies</label>
  <label><input type="checkbox" name="HealthIssues" value="Asthma"> Asthma</label>
  <label><input type="checkbox" name="HealthIssues" value="Respiratory Issues"> Respiratory Issues</label>
</div>
<h2>Building & Roofing Information</h2>

<label>What year was your home built?</label>
<input type="text" name="HomeBuilt">

<label>Are you aware of any asbestos in your home?</label>
<select name="Asbestos">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>What is the estimated square footage of the finished spaces in your home?</label>
<input type="text" name="SquareFootage">

<label>How old is your roof?</label>
<input type="text" name="RoofAge">

<label>Does your roof leak during any time of the year?</label>
<select name="RoofLeaks">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Do icicles form on the eaves or in the attic during the winter?</label>
<select name="Icicles">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<h2>HVAC & Utilities Information</h2>

<label>Thermostat Summer Set Point:</label>
<input type="text" name="TstatSummer">

<label>Thermostat Winter Set Point:</label>
<input type="text" name="TstatWinter">

<label>What type of fuel do you us to heat your home?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="HeatFuel" value="Oil"> Oil</label>
  <label><input type="checkbox" name="HeatFuel" value="Electricity"> Electricity</label>
  <label><input type="checkbox" name="HeatFuel" value="Natural Gas"> Natural Gas</label>
  <label><input type="checkbox" name="HeatFuel" value="Propane"> Propane</label>
</div>

<label>Name of Provider</label>
<input type="text" name="FuelProvider">

<label>What type of cooling system do you have?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="CoolingSystem" value="Central A/C"> Central A/C</label>
  <label><input type="checkbox" name="CoolingSystem" value="Window"> Window</label>
  <label><input type="checkbox" name="CoolingSystem" value="Ductless Minisplit"> Ductless Minisplit</label>
  <label><input type="checkbox" name="CoolingSystem" value="None"> None</label>
</div>

<label>How often do you change filters?</label>
<input type="text" name="FilterFrequency">

<label>Who is your electric utility supplier?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="ElectricUtility" value="ConEd"> ConEd</label>
  <label><input type="checkbox" name="ElectricUtility" value="NYSEG"> NYSEG</label>
  <label><input type="checkbox" name="ElectricUtility" value="Central Hudson"> Central Hudson</label>
  <label><input type="checkbox" name="ElectricUtility" value="Other"> Other</label>
</div>

<h2>Other Information</h2>

<label>Is there any other information you feel we should know about?</label>
<textarea name="OtherComments"></textarea>

<div class="submit-button">
  <button type="submit">Submit</button>
</div>

</form>

  <div class="powered-by">
    Powered by Healthy Home Energy & Consulting
  </div>

  <script>
    const form = document.getElementById('heatPumpForm');

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      alert('Thank you for completing your Home Performance Evaluation! Our team will review your information and be in touch shortly.');

      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => {
        if (data[key]) {
          data[key] += `, ${value}`;
        } else {
          data[key] = value;
        }
      });

      fetch('https://script.google.com/macros/s/AKfycbwRoHmHnIfN2_ldceYzfvcr1xkL1gPnlfenndrV5xJxYOPQyMPDiQsnVjtioCrSauVghw/exec', {
  method: 'POST',
  mode: 'no-cors',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify(data)
});
      form.reset();
    });
  </script>

</body>
</html>
