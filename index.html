<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Performance Questionnaire</title>
  <style>
input, select, textarea {
  margin-bottom: 15px;
} 
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f8fdf8;
  }
  h1 {
    text-align: center;
    margin-bottom: 22px;
  }
form {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 20px; /* was 25px — slightly tighter form body */
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px; /* was 20px */
  margin-bottom: 3px; /* was 5px */
}

input, select, textarea {
  width: 100%;
  padding: 8px 10px;
  margin-top: 2px;
  margin-bottom: 8px; /* was 10-15px — now tighter */
  box-sizing: border-box;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

textarea {
  resize: vertical;
  min-height: 80px;
}

.checkbox-group {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-left: 0;
  margin-left: 0;
  gap: 4px; /* was 6px — even tighter */
}

.checkbox-group label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 2px 0; /* was 4px — less vertical space */
  font-weight: normal;
  font-size: 15px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.checkbox-group input[type="checkbox"] {
  width: 18px;
  height: 18px;
  transform: translateY(2px);
}

.submit-button {
  margin-top: 20px; /* slightly tighter between last field and submit */
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  background-color: white;
  color: #54b948;
  border: 2px solid #54b948;
  border-radius: 8px;
  transition: 0.3s ease;
}

button:hover {
  background-color: #c9f3c2;
  color: black;
}

.powered-by {
  text-align: center;
  margin-top: 30px;
  font-size: 0.9em;
  color: #54b948;
}

  @media (max-width: 600px) {
    form {
      padding: 15px;
    }
    .checkbox-group label {
      width: 100%;
    }
  }
</style>

</head>
<body>

<h1>Home Performance Questionnaire</h1>

<form id="homePerformanceForm">

  <!-- Contact Information -->
  <label>Name:</label>
  <input type="text" name="Name" required>

  <label>Address:</label>
  <input type="text" name="Address" required>

  <label>Email:</label>
  <input type="email" name="Email" required>

  <label>Primary Phone:</label>
  <input type="tel" name="PrimaryPhone">

  <label>Secondary Phone:</label>
  <input type="tel" name="SecondaryPhone">

  <!-- How They Heard About You -->
  <label>How did you hear about Healthy Home Energy & Consulting?</label>
  <input type="text" name="HeardAbout">

  <label>What motivated you to get a Healthy Home Evaluation?</label>
  <input type="text" name="PrimaryMotivation">

  <!-- Improvement Benefits -->
  <label>Top 3 Potential Improvement Benefits:</label>
  <div class="checkbox-group">
    <label><input type="checkbox" name="ImprovementBenefits" value="Improved Indoor Air Quality"> Improved Indoor Air Quality</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Occupant Comfort"> Occupant Comfort</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Occupant Health and Safety"> Occupant Health and Safety</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Reduced Carbon Footprint"> Reduced Carbon Footprint</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Energy Savings"> Energy Savings</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Increased Home Value"> Increased Home Value</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Durability of Improvements"> Durability of Improvements</label>
    <label><input type="checkbox" name="ImprovementBenefits" value="Sound Attenuation"> Sound Attenuation</label>
  </div>
<label>Does your home feel stuffy?</label>
<select name="StuffyAir">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Are there drafty areas?</label>
<select name="DraftyAreas">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>If so, where and when?</label>
<textarea name="DraftLocations"></textarea>

<label>Are any rooms too hot or too cold?</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="RoomTemps" value="Too Cold"> Too Cold</label>
  <label><input type="checkbox" name="RoomTemps" value="Too Warm"> Too Warm</label>
</div>

<label>If so, where and when?</label>
<textarea name="RoomTempLocations"></textarea>

<h2>Building & Roofing Information</h2>

<label>What year was your home built?</label>
<input type="text" name="HomeBuilt">

<label>Are you aware of asbestos-containing materials?</label>
<select name="Asbestos">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Estimated finished square footage:</label>
<input type="text" name="SquareFootage">

<label>How old is your roof?</label>
<input type="text" name="RoofAge">

<label>Have you experienced roof leaks?</label>
<select name="RoofLeaks">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<label>Do icicles form on eaves during the winter?</label>
<select name="Icicles">
  <option value="">Select...</option>
  <option value="Yes">Yes</option>
  <option value="No">No</option>
</select>

<h2>HVAC & Utilities Information</h2>

<label>Thermostat Summer Set Point:</label>
<input type="text" name="TstatSummer">

<label>Thermostat Winter Set Point:</label>
<input type="text" name="TstatWinter">

<label>Type of Heating Fuel:</label>
<input type="text" name="HeatingFuel">

<label>Fuel Provider:</label>
<input type="text" name="FuelProvider">

<label>Cooling System Type:</label>
<input type="text" name="CoolingType">

<label>How often do you change filters?</label>
<input type="text" name="FilterFrequency">

<label>Electric Utility Provider:</label>
<div class="checkbox-group">
  <label><input type="checkbox" name="ElectricUtility" value="ConEd"> ConEd</label>
  <label><input type="checkbox" name="ElectricUtility" value="NYSEG"> NYSEG</label>
  <label><input type="checkbox" name="ElectricUtility" value="Central Hudson"> Central Hudson</label>
  <label><input type="checkbox" name="ElectricUtility" value="Other"> Other</label>
</div>

<h2>Other Information</h2>

<label>Is there anything else you would like us to know?</label>
<textarea name="OtherComments"></textarea>

<div class="submit-button">
  <button type="submit">Submit</button>
</div>

</form>

  <div class="powered-by">
    Powered by Healthy Home Energy & Consulting
  </div>

  <script>
    const form = document.getElementById('heatPumpForm');

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      alert('Thank you for completing your Home Performance Evaluation! Our team will review your information and be in touch shortly.');

      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => {
        if (data[key]) {
          data[key] += `, ${value}`;
        } else {
          data[key] = value;
        }
      });

      fetch('https://script.google.com/macros/s/AKfycbwRoHmHnIfN2_ldceYzfvcr1xkL1gPnlfenndrV5xJxYOPQyMPDiQsnVjtioCrSauVghw/exec', {
  method: 'POST',
  mode: 'no-cors',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify(data)
});
      form.reset();
    });
  </script>

</body>
</html>
